# ---------------------------------------------------------------------------
# Job Digest Configuration
# Edit this file to adjust what gets searched, filtered, and emailed to you.
# ---------------------------------------------------------------------------

# JSearch API settings
api:
  # How far back to look for postings each run.
  # Options: today | 3days | week | month
  # NOTE: Use '3days' or 'week' rather than 'today'. 'today' only returns jobs
  # posted in the current calendar day, which is very sparse. The seen_jobs.json
  # deduplication prevents re-sending anything you've already received, so a
  # wider window is safe and ensures you catch everything.
  date_posted: "3days"
  # Number of result pages per search (1 page ≈ 10 results).
  # Increase to 2-3 if you want more results; watch your API quota.
  num_pages: 1

# ---------------------------------------------------------------------------
# Search queries sent to the JSearch API.
# Each entry produces one API call. 6 searches × 31 days = 186 requests/month,
# safely within the free tier limit of 200. remote_only: true fetches jobs with no
# specific city — use this to catch fully-remote postings.
# ---------------------------------------------------------------------------
searches:
  # -- Quality Assurance --
  # Broad "quality assurance" query captures both engineers and managers;
  # filter.py classifies by title keywords after retrieval.
  - query: "quality assurance"
    location: "San Francisco, CA, USA"
    category: qa
  - query: "quality assurance engineer"
    remote_only: true
    category: qa

  # -- Product Manager --
  # "associate product manager" targets the entry-level niche directly;
  # generic PM-SF search dropped since APMs appear in this query and the
  # filter excludes senior titles anyway.
  - query: "associate product manager"
    location: "San Francisco, CA, USA"
    category: pm
  - query: "product manager"
    remote_only: true
    category: pm

  # -- Writing --
  # Broad "writer" query captures technical writers, copywriters, and content
  # writers in one call; filter.py handles sub-classification by title keywords.
  - query: "writer"
    location: "San Francisco, CA, USA"
    category: writing
  - query: "technical writer"
    remote_only: true
    category: writing

# ---------------------------------------------------------------------------
# URL blocklist
# Any job whose apply URL contains one of these substrings is dropped before
# any other filter runs. Use this to exclude unreliable scrapers or
# aggregators that produce stale/redirect-heavy listings.
# ---------------------------------------------------------------------------
url_blocklist:
  - "frontendnode-production.up.railway.app"

# ---------------------------------------------------------------------------
# Location filter
# A job passes if its location field contains an allowed_substring OR the
# job is flagged remote by the API.  Then the description is scanned for
# suburb names — if found without offsetting remote/hybrid language, the
# job is excluded.
# ---------------------------------------------------------------------------
location_filter:
  # Location field must contain at least one of these to pass.
  # "South San Francisco" is handled separately and will NOT match here.
  allowed_substrings:
    - "San Francisco"
    - "Remote"
    - "Anywhere"
    - "Work from Home"
    - "WFH"

  # If any of these appear in the job *description* (and the description
  # does NOT also mention remote/hybrid work), the job is excluded even
  # if the location field says "San Francisco".
  suburb_exclusions:
    - "South San Francisco"
    - "Sunnyvale"
    - "Mountain View"
    - "Palo Alto"
    - "San Jose"
    - "Santa Clara"
    - "Cupertino"
    - "Milpitas"
    - "Fremont"
    - "Hayward"
    - "Oakland"
    - "Berkeley"
    - "Emeryville"
    - "San Mateo"
    - "Foster City"
    - "Redwood City"
    - "Burlingame"
    - "San Bruno"
    - "Daly City"
    - "Menlo Park"
    - "Walnut Creek"
    - "Concord"
    - "Pleasanton"
    - "Livermore"
    - "Dublin, CA"
    - "San Ramon"
    - "San Rafael"
    - "Novato"

# ---------------------------------------------------------------------------
# Category-specific filter rules
# ---------------------------------------------------------------------------
categories:

  # -- Quality Assurance --
  # Target: senior / management level, software industry only.
  qa:
    # Job title must contain at least one of these to be classified as QA.
    title_keywords:
      - "quality assurance"
      - "quality engineer"
      - "qa engineer"
      - "qa manager"
      - "qa lead"
      - "qa analyst"
      - "sdet"
      - "test engineer"
      - "test automation engineer"
      - "software tester"
      - "quality control engineer"

    # FILTER — description must contain at least one (confirms software industry).
    # Excludes food safety QA, pharmaceutical QA, manufacturing QA, etc.
    industry_keywords:
      - "software"
      - "application"
      - "web"
      - "mobile"
      - "api"
      - "agile"
      - "scrum"
      - "selenium"
      - "test automation"
      - "cypress"
      - "playwright"
      - "ci/cd"
      - "saas"
      - "devops"
      - "jira"
      - "github"
      - "jenkins"
      - "code"
      - "programming"
      - "development"

    # FILTER — title OR description must contain at least one (confirms seniority).
    # Matches both explicit titles ("Senior QA Engineer") and description signals
    # ("5+ years of experience in QA").
    seniority_include_keywords:
      - "senior"
      - "sr."
      - "sr "
      - "lead"
      - "principal"
      - "manager"
      - "director"
      - "staff"
      - "5+ years"
      - "6+ years"
      - "7+ years"
      - "8+ years"
      - "5 years"
      - "6 years"
      - "7 years"

    # FILTER — job TITLE must NOT contain any of these (excludes executive roles).
    # Checked against the title only, so description references like
    # "reports to the VP of Engineering" do not produce false positives.
    executive_exclude_keywords:
      - "vice president"
      - "vp of"
      - "vp,"
      - " vp "
      - "director"
      - "head of"
      - "chief"
      - "cto"
      - "cqo"

    # FILTER — job TITLE must NOT contain any of these junior/entry-level signals.
    # QA targets senior and management level roles. Checked against title only
    # because description text frequently mentions "senior" or experience years
    # in unrelated context (e.g. "reports to a Senior Engineer"), which would
    # otherwise let junior postings pass the seniority_include check below.
    junior_exclude_keywords:
      - "junior"
      - "jr."
      - "jr "
      - "entry level"
      - "entry-level"
      - "associate"

    # FILTER — job TITLE containing any of these immediately indicates a
    # non-software industry. The job is excluded before the description is checked.
    # Title-level signals are reliable: a title like "Hardware QA Engineer" or
    # "Food Safety QA Specialist" unambiguously places the role outside software.
    # Note: this list is also checked against the post-comma domain qualifier in
    # titles that follow the "[Role], [Industry]" pattern (e.g.
    # "QA Manager, Jewelry & Luggage"). See passes_qa_filter() in filter.py.
    industry_exclude_title_keywords:
      # --- original ---
      - "food"
      - "hardware"
      - "pharmaceutical"
      - "pharma"
      - "GMP"
      - "HACCP"
      - "mechanical"
      - "electrical"
      - "semiconductor"
      - "chemical"
      - "manufacturing"
      - "supply chain"
      # --- life sciences / clinical / pharma ---
      # "clinical" alone catches "Clinical Research QA", "Clinical QA Manager",
      # etc. Edge case: "QA Engineer, Clinical Software" is legitimate software QA,
      # but such roles almost always include a product name ("EMR", "EHR",
      # "healthcare software") rather than just "clinical".
      - "clinical"
      - "clinical research"
      - "clinical trial"
      - "gcp"
      - "glp"
      - "pharmacovigilance"
      - "drug safety"
      - "biopharmaceutical"
      - "biopharma"
      # --- food & beverage (additional) ---
      - "beverage"
      - "brewery"
      - "brewing"
      - "dairy"
      - "winery"
      - "culinary"
      # --- manufacturing verticals (additional) ---
      - "automotive"
      - "aerospace"
      - "aviation"
      - "defense"
      - "defence"
      - "plastics"
      - "composites"
      - "metallurgy"
      # --- retail / consumer goods ---
      - "retail"
      - "jewelry"
      - "jewellery"
      - "luggage"
      - "apparel"
      - "fashion"
      - "textile"
      - "beauty"
      - "cosmetics"
      - "accessories"
      - "luxury"
      - "consumer goods"
      - "consumer products"
      - "merchandise"
      - "footwear"
      - "toys"
      - "sporting goods"
      - "furniture"
      - "home goods"
      - "garment"
      # --- construction / civil engineering ---
      - "construction"
      - "civil"
      - "structural"
      - "real estate"
      # --- energy / oil & gas / mining ---
      - "oil"
      - "gas"
      - "petroleum"
      - "mining"
      - "refinery"
      - "drilling"
      # --- agriculture ---
      - "agricultural"
      - "agriculture"
      - "agrochemical"
      # --- warehousing / logistics ---
      # "logistics software QA" roles almost always include "software" or
      # "platform" in the title; bare "logistics QA" is warehouse operations.
      - "warehouse"
      - "logistics"

    # FILTER — description containing any of these strongly implies a non-software
    # industry even when generic software-adjacent words (code, development,
    # application) also appear. These terms are specific enough that they will
    # not appear in legitimate software QA job descriptions.
    industry_exclude_description_keywords:
      # --- original ---
      - "HACCP"
      - "food safety"
      - "good manufacturing practice"
      - "food production"
      - "food manufacturing"
      - "printed circuit board"
      - "PCB assembly"
      - "soldering"
      - "semiconductor fabrication"
      - "food and drug"
      - "ISO 22000"
      # --- life sciences / clinical / pharma ---
      - "GCP"
      - "GLP"
      - "ICH guidelines"
      - "FDA 21 CFR"
      - "protocol deviation"
      - "pharmacovigilance"
      - "investigational drug"
      - "investigational product"
      - "ISO 13485"
      - "ISO 14971"
      - "eCTD"
      - "CDISC"
      - "informed consent"
      - "adverse event reporting"
      # --- food & beverage (additional) ---
      - "allergen"
      - "pathogen testing"
      - "food processing"
      - "FSMA"
      - "beverage production"
      # --- manufacturing (additional) ---
      - "IATF 16949"
      - "AS9100"
      - "PPAP"
      - "assembly line"
      - "shop floor"
      - "lean manufacturing"
      - "machining"
      - "welding"
      - "casting"
      - "injection molding"
      # --- retail / consumer goods ---
      - "SKU"
      - "retail store"
      - "consumer goods"
      - "merchandise"
      - "garment inspection"
      - "fabric testing"
      - "consumer product safety"
      # --- construction ---
      - "building codes"
      - "site inspection"
      - "structural integrity"
      - "construction defect"
      # --- energy / oil & gas ---
      - "oil and gas"
      - "drilling operations"
      - "pipeline inspection"
      - "ISO 29001"
      # --- agriculture ---
      - "crop production"
      - "agrochemical"
      - "pesticide quality"

  # -- Product Manager --
  # Target: associate / junior / entry-level, software/tech industry only.
  pm:
    # Job title must contain at least one of these to be classified as PM.
    title_keywords:
      - "product manager"
      - "product management"
      - "product owner"

    # FILTER — description must contain at least one (confirms tech industry).
    # Excludes retail category managers, event PMs, construction PMs, etc.
    industry_keywords:
      - "product"
      - "software"
      - "app"
      - "platform"
      - "saas"
      - "roadmap"
      - "agile"
      - "sprint"
      - "backlog"
      - "user story"
      - "engineering"
      - "tech"
      - "startup"
      - "b2b"
      - "b2c"
      - "feature"

    # FILTER — if title OR description contains any of these, job is excluded.
    # Catches senior roles that only signal seniority in the description.
    seniority_exclude_keywords:
      - "senior"
      - "sr."
      - "sr "
      - "lead"
      - "principal"
      - "director"
      - "vp"
      - "vice president"
      - "head of"
      - "5+ years"
      - "6+ years"
      - "7+ years"
      - "8+ years"

    # Jobs whose descriptions explicitly require more years than this are excluded.
    # Catches ranges like "5-7 years" that keyword matching alone would miss.
    # The lower bound of a range is used ("3-5 years" → 3).
    # Set to 0 to disable.
    max_years_experience: 2

    # If title OR description contains one of these, the job is cleanly passed.
    # If NONE are found (and no exclude signals), the job still passes but is
    # tagged [seniority unclear] in the email so you can eyeball it.
    seniority_include_keywords:
      - "associate"
      - "junior"
      - "jr."
      - "jr "
      - "entry level"
      - "entry-level"
      - "0-2 years"
      - "1-2 years"
      - "1-3 years"
      - "2+ years"
      - "new grad"

  # -- Writing --
  # Target: technical writer (primary), copywriter (secondary),
  #         any entry-level writing job (tertiary).
  # No industry restriction. Writing is a career change, so senior/executive
  # titles are excluded (title-only check, same rationale as PM).
  writing:
    # Job title must contain at least one of these to be classified as Writing.
    title_keywords:
      - "technical writer"
      - "technical writing"
      - "copywriter"
      - "copy writer"
      - "content writer"
      - "writer"
      - "ux writer"
      - "content strategist"

    # Jobs whose descriptions explicitly require more years than this are excluded.
    # Set to 0 to disable.
    max_years_experience: 2

    # FILTER — if the job TITLE contains any of these, the job is excluded.
    # Checked against title only (not description) — seniority words like
    # "senior" and "lead" appear constantly as verbs in writing job descriptions.
    seniority_exclude_keywords:
      - "senior"
      - "sr."
      - "sr "
      - "lead"
      - "principal"
      - "staff"
      - "director"
      - "vp"
      - "vice president"
      - "head of"
      - "manager"

    # Sub-classification for the email display tag.
    # Checked in order: technical → copywriting → general (first match wins).
    subcategories:
      technical:
        - "technical writer"
        - "technical writing"
        - "ux writer"
        - "documentation"
      copywriting:
        - "copywriter"
        - "copy writer"
        - "content strategist"
      general:
        - "writer"
        - "content writer"

# ---------------------------------------------------------------------------
# Email settings
# recipient, gmail_address, and gmail_app_password are set via environment
# variables (RECIPIENT_EMAIL, GMAIL_ADDRESS, GMAIL_APP_PASSWORD) — do NOT
# put credentials in this file.
# ---------------------------------------------------------------------------
email:
  subject_prefix: "Job Digest"
  # Set to true to receive an email even when no new jobs were found.
  send_if_empty: false
